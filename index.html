<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>31 August 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --front-image: url("https://raw.githubusercontent.com/maryam-FOLDS/Shrilavanyas-Harish/refs/heads/main/frontL.png");
      --final-image: url("https://raw.githubusercontent.com/maryam-FOLDS/Shrilavanyas-Harish/refs/heads/main/FinalimageL.jpg");

      --bg-1: #fffdf9;
      --bg-2: #fff8ee;
      --bg-3: #fff4e6;
      --paper: rgba(255, 251, 244, 0.84);
      --paper-strong: rgba(255, 252, 247, 0.96);

      --gold: #bf8f4c;
      --gold-deep: #8f6630;
      --gold-soft: rgba(191, 143, 76, 0.16);
      --gold-line: rgba(191, 143, 76, 0.26);
      --gold-glow: rgba(255, 215, 151, 0.42);

      --text: #5f4f40;
      --muted: #94806b;
      --shadow-xl: 0 34px 80px rgba(83, 52, 15, 0.13);
      --shadow-lg: 0 22px 54px rgba(83, 52, 15, 0.11);
      --shadow-md: 0 14px 34px rgba(83, 52, 15, 0.08);

      --door-duration: 3.9s;
      --door-ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 228, 186, 0.58), transparent 26%),
        radial-gradient(circle at 82% 16%, rgba(255, 243, 218, 0.74), transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 46%, var(--bg-1) 100%);
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: "Manrope", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 221, 175, 0.26), transparent 20%),
        radial-gradient(circle at 85% 10%, rgba(255, 241, 221, 0.74), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(255, 233, 198, 0.22), transparent 34%),
        linear-gradient(180deg, #fffdf9 0%, #fff8ef 42%, #fffdf9 100%);
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    body::before {
      width: 34vw;
      height: 34vw;
      max-width: 360px;
      max-height: 360px;
      top: 8vh;
      left: -8vw;
      background: rgba(255, 225, 184, 0.35);
    }

    body::after {
      width: 30vw;
      height: 30vw;
      max-width: 320px;
      max-height: 320px;
      right: -6vw;
      bottom: 10vh;
      background: rgba(255, 236, 205, 0.34);
    }

    button {
      font: inherit;
    }

    .fx,
    .fx::before,
    .fx::after {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      z-index: 1;
    }

    .fx-stars,
    .fx-stars::before,
    .fx-stars::after {
      background-repeat: repeat;
      mix-blend-mode: screen;
      animation: driftY linear infinite;
      opacity: 0.52;
    }

    .fx-stars {
      background-image:
        radial-gradient(circle at 12% 24%, rgba(255,255,255,0.95) 0 1.1px, transparent 1.7px),
        radial-gradient(circle at 68% 14%, rgba(255,244,228,0.95) 0 1.7px, transparent 2.4px),
        radial-gradient(circle at 84% 58%, rgba(255,255,255,0.72) 0 1px, transparent 1.5px),
        radial-gradient(circle at 40% 82%, rgba(255,235,200,0.7) 0 1.4px, transparent 2px);
      background-size: 340px 340px;
      animation-duration: 16s;
    }

    .fx-stars::before {
      background-image:
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.72) 0 0.9px, transparent 1.4px),
        radial-gradient(circle at 60% 30%, rgba(255,239,217,0.8) 0 1.2px, transparent 1.9px);
      background-size: 440px 440px;
      animation-duration: 22s;
      animation-direction: reverse;
      opacity: 0.55;
    }

    .fx-stars::after {
      background-image:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.58) 0 0.8px, transparent 1.3px),
        radial-gradient(circle at 88% 74%, rgba(255,241,219,0.68) 0 1.3px, transparent 1.8px);
      background-size: 520px 520px;
      animation-duration: 28s;
      opacity: 0.45;
    }

    .fx-dust {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 40%),
        linear-gradient(315deg, rgba(255,255,255,0.05), transparent 42%);
      opacity: 0.45;
    }

    @keyframes driftY {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(0, -44px, 0); }
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 30;
      overflow: hidden;
      perspective: 2600px;
      perspective-origin: 50% 50%;
      transform-style: preserve-3d;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.32), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, rgba(255,255,255,0.66), rgba(255,255,255,0.18));
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }

    .intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-backdrop,
    .intro-bloom,
    .intro-sheen {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .intro-backdrop {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0));
      z-index: 1;
    }

    .intro-bloom {
      background:
        radial-gradient(circle at center, rgba(255, 224, 172, 0.18), transparent 24%),
        radial-gradient(circle at center, rgba(255,255,255,0.5), transparent 46%);
      filter: blur(24px);
      opacity: 0.82;
      z-index: 2;
      transition: transform 2.2s ease, opacity 1.2s ease;
    }

    .intro-sheen {
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.22) 45%, transparent 72%);
      transform: translateX(-120%);
      z-index: 9;
      opacity: 0.66;
    }

    .intro.opening .intro-sheen {
      animation: introSheen 1.45s ease forwards;
    }

    @keyframes introSheen {
      to { transform: translateX(120%); }
    }

    .door {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, filter, opacity;
      transition:
        transform var(--door-duration) var(--door-ease),
        filter var(--door-duration) var(--door-ease),
        opacity 0.8s ease;
      z-index: 6;
      pointer-events: none;
    }

    .door-left {
      clip-path: inset(0 49.7% 0 0);
      transform-origin: left center;
    }

    .door-right {
      clip-path: inset(0 0 0 49.7%);
      transform-origin: right center;
    }

    .door-face,
    .door-shadow {
      position: absolute;
      inset: -2px;
      border: 0;
      backface-visibility: hidden;
    }

    .door-face {
      background-image: var(--front-image);
      background-size: cover;
      background-position: center;
      transform: scale(1.01);
      filter: saturate(1.04) contrast(1.02);
    }

    .door-face::before,
    .door-face::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .door-face::before {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0) 22%, rgba(0,0,0,0.05));
      mix-blend-mode: screen;
    }

    .door-face::after {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.10), transparent 32%);
      opacity: 0.9;
    }

    .door-shadow {
      opacity: 0;
      transition: opacity 1.1s ease;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.18), transparent 12%, transparent 88%, rgba(0,0,0,0.18));
      mix-blend-mode: multiply;
    }

    .intro.opening .door-shadow {
      opacity: 1;
    }

    .intro.opening .door-left {
      transform: translateX(-2.4vw) rotateY(-108deg) scaleX(1.01);
      filter: brightness(1.02) saturate(1.06);
    }

    .intro.opening .door-right {
      transform: translateX(2.4vw) rotateY(108deg) scaleX(1.01);
      filter: brightness(1.02) saturate(1.06);
    }

    .intro.opening .intro-bloom {
      transform: scale(1.16);
      opacity: 1;
    }

    .open-button-wrap {
      position: absolute;
      left: 50%;
      bottom: max(52px, env(safe-area-inset-bottom) + 24px);
      transform: translateX(-50%);
      z-index: 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      width: min(88vw, 360px);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.46);
      color: var(--gold-deep);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      box-shadow: 0 10px 22px rgba(94, 61, 16, 0.08);
      backdrop-filter: blur(12px);
    }

    .kicker::before,
    .kicker::after {
      content: "";
      width: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(191, 143, 76, 0.55), transparent);
    }

    .open-button {
      position: relative;
      min-width: 210px;
      padding: 17px 30px;
      border: 1px solid rgba(191, 143, 76, 0.34);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,250,243,0.92));
      color: var(--gold-deep);
      font-size: 0.94rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      box-shadow:
        0 18px 42px rgba(83, 52, 15, 0.15),
        0 0 0 0 rgba(255, 214, 148, 0.32);
      backdrop-filter: blur(14px);
      cursor: pointer;
      overflow: hidden;
      transition:
        transform 0.3s ease,
        box-shadow 0.35s ease,
        opacity 0.45s ease,
        border-color 0.3s ease;
      animation: pulseGlow 2.6s ease-in-out infinite;
    }

    .open-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 12%, rgba(255,255,255,0.78) 48%, transparent 74%);
      transform: translateX(-140%);
      animation: btnShine 3.2s linear infinite;
    }

    @keyframes btnShine {
      100% { transform: translateX(140%); }
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow:
          0 18px 42px rgba(83, 52, 15, 0.13),
          0 0 0 0 rgba(255, 214, 148, 0.26);
      }
      50% {
        box-shadow:
          0 24px 54px rgba(83, 52, 15, 0.17),
          0 0 0 14px rgba(255, 214, 148, 0);
      }
    }

    .open-button:hover,
    .open-button:active {
      transform: translateY(-2px) scale(1.012);
      border-color: rgba(191, 143, 76, 0.5);
    }

    .open-button:disabled {
      opacity: 0.58;
      cursor: wait;
      animation: none;
    }

    .intro.opening .open-button-wrap {
      opacity: 0;
      transform: translateX(-50%) translateY(18px);
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.6s ease;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 18px 16px 56px;
      pointer-events: none;
    }

    body.revealed {
      overflow-x: hidden;
      overflow-y: auto;
    }

    body.revealed .content {
      pointer-events: auto;
    }

    .invite-shell {
      position: relative;
      max-width: 860px;
      margin: 0 auto;
    }

    .hero-stage {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: clamp(20px, 5vh, 50px) 0 clamp(26px, 4vh, 42px);
    }

    .hero-stack {
      display: grid;
      justify-items: center;
      gap: 0;
    }

    .image-card {
      position: relative;
      width: min(90vw, 620px);
      border-radius: 36px;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,250,242,0.95));
      border: 1px solid rgba(191, 143, 76, 0.14);
      box-shadow:
        var(--shadow-xl),
        inset 0 1px 0 rgba(255,255,255,0.65),
        inset 0 -1px 0 rgba(255, 243, 223, 0.32);
      backdrop-filter: blur(16px);
      transform: translateY(30px) scale(0.98);
      opacity: 0;
      transition:
        transform 1.35s cubic-bezier(0.18, 0.84, 0.2, 1),
        opacity 1.35s ease,
        box-shadow 0.45s ease;
      transition-delay: 0.08s;
      animation: cardFloat 6.5s ease-in-out infinite;
      animation-play-state: paused;
    }

    .image-card::before {
      content: "";
      position: absolute;
      inset: -24px;
      border-radius: 44px;
      background:
        radial-gradient(circle at center, rgba(255, 221, 167, 0.26), transparent 54%);
      filter: blur(22px);
      z-index: -2;
      pointer-events: none;
    }

    .image-card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.65),
        rgba(191,143,76,0.22),
        rgba(255,255,255,0.45)
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.9;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.004); }
    }

    .image-wrap {
      position: relative;
      width: 100%;
      line-height: 0;
      border-radius: 26px;
      overflow: hidden;
      background: #fff;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.55),
        0 10px 26px rgba(83, 52, 15, 0.06);
      isolation: isolate;
    }

    .image-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18), transparent 28%);
      z-index: 2;
      pointer-events: none;
    }

    .image-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0) 22%, rgba(0,0,0,0.045));
      z-index: 2;
      pointer-events: none;
    }

    .invite-image {
      display: block;
      width: 100%;
      height: auto;
      transform: scale(1.022);
      filter: saturate(1.04) contrast(1.02);
      transition: transform 1.9s ease, filter 1.1s ease;
    }

    body.revealed .invite-image {
      transform: scale(1);
    }

    .scratch-zone {
      position: absolute;
      border-radius: 999px;
      overflow: hidden;
      touch-action: none;
      background:
        linear-gradient(135deg,
          rgba(255, 248, 233, 0.98) 0%,
          rgba(242, 223, 184, 0.98) 16%,
          rgba(197, 150, 85, 0.98) 34%,
          rgba(255, 243, 212, 0.98) 52%,
          rgba(173, 121, 56, 0.98) 72%,
          rgba(255, 246, 226, 0.98) 100%);
      border: 1px solid rgba(191, 143, 76, 0.34);
      box-shadow:
        0 12px 24px rgba(83, 52, 15, 0.10),
        inset 0 1px 0 rgba(255,255,255,0.68),
        inset 0 -1px 0 rgba(131, 92, 39, 0.16);
      opacity: 0;
      transform: translateY(18px) scale(0.95);
      transition:
        opacity 1.05s ease,
        transform 1.05s ease,
        box-shadow 0.3s ease,
        border-color 0.3s ease,
        background 0.3s ease;
      transition-delay: 0.18s;
      z-index: 3;
    }

    .scratch-zone::before {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.60) 46%, transparent 74%);
      transform: translateX(-140%);
      animation: scratchShine 3.2s linear infinite;
      pointer-events: none;
      z-index: 3;
    }

    .scratch-zone::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        repeating-linear-gradient(
          112deg,
          rgba(255,255,255,0.18) 0 6px,
          rgba(171, 122, 58, 0.10) 6px 12px,
          rgba(255,244,218,0.16) 12px 18px
        );
      mix-blend-mode: soft-light;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes scratchShine {
      100% { transform: translateX(140%); }
    }

    .scratch-zone canvas,
    .scratch-zone .scratch-hint {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .scratch-zone .scratch-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(111, 84, 46, 0.82);
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
      transition: opacity 0.32s ease;
    }

    .scratch-zone.revealed {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      pointer-events: none;
    }

    .scratch-zone.revealed::before,
    .scratch-zone.revealed::after {
      display: none;
    }

    .scratch-zone.revealed canvas,
    .scratch-zone.revealed .scratch-hint {
      opacity: 0;
    }

    .scratch-left {
    left: 22%;
    top: 83.2%;
    width: 20.8%;
    height: 7.6%;
    }

    .scratch-right {
    left: 57.8%;
    top: 83.2%;
    width: 20.8%;
    height: 7.6%;
    }

    body.revealed .image-card,
    body.revealed .scratch-zone {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    body.revealed .image-card {
      animation-play-state: paused;
    }

    body.card-float-ready .image-card {
      animation-play-state: running;
    }

    .image-card.locked {
      animation-play-state: paused !important;
      transform: translateY(0) scale(1) !important;
    }

    .after-reveal {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 0.95s ease, transform 0.95s ease;
      padding-top: 14px;
    }

    .after-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .countdown-panel {
      max-width: 780px;
      margin: 0 auto;
      padding: 18px 4px 0;
    }

    .countdown {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 12px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 4px 0 8px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .countdown::-webkit-scrollbar {
      display: none;
    }

    .time-box {
      position: relative;
      min-width: 112px;
      flex: 0 0 112px;
      padding: 18px 10px 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,251,245,0.98), rgba(255,255,255,0.98));
      border: 1px solid rgba(191, 143, 76, 0.18);
      box-shadow: var(--shadow-md);
      text-align: center;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .time-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.56), transparent 62%);
      pointer-events: none;
    }

    .time-box::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 224, 174, 0.12), transparent 44%);
      pointer-events: none;
    }

    .time-value {
      display: block;
      position: relative;
      z-index: 1;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2rem, 4vw, 2.55rem);
      line-height: 0.95;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #6e563a;
      margin-bottom: 8px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.42);
    }

    .time-label {
      display: block;
      position: relative;
      z-index: 1;
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .note {
      position: relative;
      max-width: 640px;
      margin: 26px auto 0;
      padding: 24px 20px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,251,245,0.95), rgba(255,255,255,0.96));
      border: 1px solid rgba(191, 143, 76, 0.18);
      box-shadow: var(--shadow-md);
      text-align: center;
      line-height: 1.78;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .note::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.76), rgba(255,255,255,0));
      pointer-events: none;
    }

    .note::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.8),
        rgba(191,143,76,0.18),
        rgba(255,255,255,0.4)
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.86;
    }

    .note p {
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .note .primary {
      font-size: 1.05rem;
      font-weight: 800;
      color: #6a5840;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .note .credit {
      color: var(--muted);
      font-size: 0.94rem;
    }

    @media (max-width: 560px) {
      .content {
        padding-left: 12px;
        padding-right: 12px;
      }

      .hero-stage {
        padding-top: 18px;
      }

      .image-card {
        width: min(94vw, 590px);
        border-radius: 28px;
        padding: 10px;
      }

      .image-wrap {
        border-radius: 20px;
      }

      .open-button {
        min-width: 188px;
        padding: 15px 24px;
        font-size: 0.88rem;
        letter-spacing: 0.18em;
      }

      .kicker {
        font-size: 0.72rem;
        letter-spacing: 0.22em;
        padding: 9px 14px;
      }

      .time-box {
        min-width: 84px;
        flex-basis: 84px;
        border-radius: 18px;
        padding: 14px 6px 12px;
      }

      .time-value {
        font-size: 1.72rem;
      }

      .time-label {
        font-size: 0.63rem;
        letter-spacing: 0.14em;
      }

      .note {
        border-radius: 20px;
        padding: 22px 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
        transition-delay: 0ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="fx fx-stars"></div>
  <div class="fx fx-dust"></div>

  <section class="intro" id="intro" aria-label="Invitation opening screen">
    <div class="intro-backdrop"></div>
    <div class="intro-bloom"></div>
    <div class="intro-sheen"></div>

    <div class="door door-left" aria-hidden="true">
      <div class="door-face"></div>
      <div class="door-shadow"></div>
    </div>

    <div class="door door-right" aria-hidden="true">
      <div class="door-face"></div>
      <div class="door-shadow"></div>
    </div>

    <div class="open-button-wrap">
      <span class="kicker">Save the Date</span>
      <button class="open-button" id="openButton" disabled>
        Open Invitation
      </button>
    </div>
  </section>

  <main class="content" id="content" aria-hidden="true">
    <div class="invite-shell">
      <section class="hero-stage">
        <div class="hero-stack">
          <div class="image-card">
            <div class="image-wrap" id="imageWrap">
              <img
                class="invite-image"
                id="inviteImage"
                src="https://raw.githubusercontent.com/maryam-FOLDS/Shrilavanyas-Harish/refs/heads/main/FinalimageL.jpg"
                alt="Save the date invitation"
              />

              <div class="scratch-zone scratch-left" data-scratch-id="left">
                <canvas></canvas>
                <div class="scratch-hint">Scratch</div>
              </div>

              <div class="scratch-zone scratch-right" data-scratch-id="right">
                <canvas></canvas>
                <div class="scratch-hint">Scratch</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="after-reveal" id="afterReveal">
        <div class="countdown-panel">
          <div class="countdown" aria-live="polite">
            <div class="time-box">
              <span class="time-value" id="days">000</span>
              <span class="time-label">Days</span>
            </div>
            <div class="time-box">
              <span class="time-value" id="hours">00</span>
              <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
              <span class="time-value" id="minutes">00</span>
              <span class="time-label">Minutes</span>
            </div>
            <div class="time-box">
              <span class="time-value" id="seconds">00</span>
              <span class="time-label">Seconds</span>
            </div>
          </div>
        </div>

        <div class="note">
          <p class="primary">Formal invitation will be given later</p>
          <p class="credit">Made by @themaryam.in<br />+91 7359033087</p>
        </div>
      </section>
    </div>
  </main>

  <audio
    id="bgSong"
    preload="auto"
    playsinline
    loop
    src="https://raw.githubusercontent.com/maryam-FOLDS/Nehal-Bushra/refs/heads/main/bushra.mp3"
  ></audio>

  <script>
    (function () {
      const OPEN_DURATION = 3900;
      const TARGET_DATE = "2026-08-31T00:00:00+05:30";
      const FRONT_IMAGE =
        "https://raw.githubusercontent.com/maryam-FOLDS/Shrilavanyas-Harish/refs/heads/main/frontL.png";
      const FINAL_IMAGE =
        "https://raw.githubusercontent.com/maryam-FOLDS/Shrilavanyas-Harish/refs/heads/main/FinalimageL.jpg";

      const intro = document.getElementById("intro");
      const openButton = document.getElementById("openButton");
      const content = document.getElementById("content");
      const afterReveal = document.getElementById("afterReveal");
      const bgSong = document.getElementById("bgSong");
      const scratchZones = Array.from(document.querySelectorAll(".scratch-zone"));
      const completedScratchZones = new Set();
      const imageCard = document.querySelector(".image-card");

      let opening = false;
      let countdownStarted = false;

      function preloadImages(urls, onDone) {
        let loaded = 0;
        if (!urls.length) {
          onDone();
          return;
        }

        urls.forEach((url) => {
          const img = new Image();
          img.onload = img.onerror = function () {
            loaded += 1;
            if (loaded === urls.length) onDone();
          };
          img.src = url;
        });
      }

      function pad(value, len) {
        return String(value).padStart(len, "0");
      }

      function startCountdown() {
        if (countdownStarted) return;
        countdownStarted = true;

        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        function tick() {
          const now = new Date();
          const target = new Date(TARGET_DATE);
          let diff = target.getTime() - now.getTime();

          if (diff < 0) diff = 0;

          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
          const minutes = Math.floor((diff / (1000 * 60)) % 60);
          const seconds = Math.floor((diff / 1000) % 60);

          daysEl.textContent = pad(days, 3);
          hoursEl.textContent = pad(hours, 2);
          minutesEl.textContent = pad(minutes, 2);
          secondsEl.textContent = pad(seconds, 2);
        }

        tick();
        window.setInterval(tick, 1000);
      }

      function showCountdown() {
        if (afterReveal.classList.contains("visible")) return;

        afterReveal.classList.add("visible");
        startCountdown();

        setTimeout(() => {
          afterReveal.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 220);
      }

      function createScratchTexture(ctx, width, height) {
        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, "#fff5de");
        gradient.addColorStop(0.22, "#efd4a2");
        gradient.addColorStop(0.45, "#c8964f");
        gradient.addColorStop(0.65, "#fff0cc");
        gradient.addColorStop(0.84, "#ac7431");
        gradient.addColorStop(1, "#f6dfb1");

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = 0.18;
        for (let x = -height; x < width + height; x += 10) {
          ctx.fillStyle = x % 20 === 0 ? "#fff9ea" : "#986621";
          ctx.fillRect(x, 0, 4, height);
        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.13;
        for (let i = 0; i < 40; i += 1) {
          const px = Math.random() * width;
          const py = Math.random() * height;
          const r = 1 + Math.random() * 2.4;
          ctx.beginPath();
          ctx.fillStyle = i % 2 === 0 ? "#fffbf3" : "#b98234";
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.22;
        const shine = ctx.createLinearGradient(0, 0, width, 0);
        shine.addColorStop(0, "rgba(255,255,255,0)");
        shine.addColorStop(0.5, "rgba(255,255,255,0.42)");
        shine.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = shine;
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
      }

      function setupScratchZone(zone) {
        const canvas = zone.querySelector("canvas");
        const hint = zone.querySelector(".scratch-hint");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });

        let drawing = false;
        let finished = false;
        let lastPoint = null;

        function sizeCanvas() {
          const rect = zone.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;

          canvas.width = Math.max(1, Math.floor(rect.width * dpr));
          canvas.height = Math.max(1, Math.floor(rect.height * dpr));
          canvas.style.width = rect.width + "px";
          canvas.style.height = rect.height + "px";

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.globalCompositeOperation = "source-over";
          createScratchTexture(ctx, rect.width, rect.height);

          ctx.globalCompositeOperation = "destination-out";
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.lineWidth = Math.max(20, rect.height * 0.82);

          if (finished) {
            ctx.clearRect(0, 0, rect.width, rect.height);
          }
        }

        function getPoint(event) {
          const rect = canvas.getBoundingClientRect();
          return {
            x: event.clientX - rect.left,
            y: event.clientY - rect.top,
          };
        }

        function scratch(point) {
          if (!point) return;

          if (lastPoint) {
            ctx.beginPath();
            ctx.moveTo(lastPoint.x, lastPoint.y);
            ctx.lineTo(point.x, point.y);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.arc(point.x, point.y, ctx.lineWidth * 0.45, 0, Math.PI * 2);
            ctx.fill();
          }

          lastPoint = point;
        }

        function clearedEnough() {
          const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
          let cleared = 0;
          let total = 0;

          for (let i = 3; i < data.length; i += 16) {
            total += 1;
            if (data[i] === 0) cleared += 1;
          }

          return total > 0 && cleared / total > 0.44;
        }

        function finish() {
          if (finished) return;
          finished = true;

          zone.classList.add("revealed");
          completedScratchZones.add(zone.dataset.scratchId);

          const rect = zone.getBoundingClientRect();
          ctx.clearRect(0, 0, rect.width, rect.height);

          canvas.style.opacity = "0";
          hint.style.opacity = "0";
          zone.style.background = "transparent";
          zone.style.borderColor = "transparent";
          zone.style.boxShadow = "none";

          if (completedScratchZones.size === scratchZones.length) {
            document.body.classList.add("card-float-ready");
            imageCard?.classList.remove("locked");
            showCountdown();
          }
        }

        canvas.addEventListener("pointerdown", (event) => {
          if (finished) return;

          imageCard?.classList.add("locked");
          drawing = true;
          lastPoint = null;
          canvas.setPointerCapture(event.pointerId);
          scratch(getPoint(event));
        });

        canvas.addEventListener("pointermove", (event) => {
          if (!drawing || finished) return;
          scratch(getPoint(event));
        });

        function endStroke() {
          drawing = false;
          lastPoint = null;

          if (!finished && clearedEnough()) {
            finish();
          }
        }

        canvas.addEventListener("pointerup", endStroke);
        canvas.addEventListener("pointercancel", endStroke);
        canvas.addEventListener("pointerleave", endStroke);
        window.addEventListener("resize", sizeCanvas);

        sizeCanvas();
      }

      function startMusic() {
        bgSong.volume = 1;
        bgSong.loop = true;
        bgSong.currentTime = 0;
        bgSong.play().catch(() => {});
      }

      function revealMainContent() {
        document.body.classList.add("revealed");
        content.setAttribute("aria-hidden", "false");
        imageCard?.classList.add("locked");
        scratchZones.forEach(setupScratchZone);
      }

      openButton.addEventListener("click", () => {
        if (opening) return;

        opening = true;
        intro.classList.add("opening");
        startMusic();

        setTimeout(() => {
          revealMainContent();
        }, 140);

        setTimeout(() => {
          intro.classList.add("hidden");
          intro.setAttribute("aria-hidden", "true");
        }, OPEN_DURATION - 260);

        setTimeout(() => {
          intro.style.display = "none";
          window.scrollTo({ top: 0, behavior: "auto" });
        }, OPEN_DURATION + 420);
      });

      preloadImages([FRONT_IMAGE, FINAL_IMAGE], () => {
        openButton.disabled = false;
      });
    })();
  </script>
